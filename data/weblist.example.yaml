# Copy to weblist.yaml and edit. Each ``*_registry`` row expands to one fetch task per company/URL.
#
# Vendors do not expose a public "list every customer" API — coverage comes from the bundled
# registries (``package:...``), inline lists, and any extra YAML file you reference with a path
# relative to this file's directory.

sources:
  - id: greenhouse_pack
    kind: greenhouse
    board_tokens_registry: package:greenhouse_boards.example.yaml

  - id: ashby_pack
    kind: ashby
    organization_slugs_registry: package:ashby_organization_slugs.example.yaml

  - id: workable_pack
    kind: workable
    apply_account_slugs_registry: package:workable_apply_slugs.example.yaml

  - id: lever_pack
    kind: lever
    site_slugs_registry: package:lever_site_slugs.example.yaml

  - id: custom_career_pack
    kind: custom_career_page
    careers_pages_registry: package:career_pages.example.yaml

  # Optional: footprint-ranked crypto / blockchain employers (``*.blockchain.yaml`` in registries/).
  # Comment out or set ``enabled: false`` if you do not want these extra fetch tasks.
  - id: greenhouse_blockchain
    kind: greenhouse
    board_tokens_registry: package:greenhouse_boards.blockchain.yaml

  - id: ashby_blockchain
    kind: ashby
    organization_slugs_registry: package:ashby_organization_slugs.blockchain.yaml

  - id: workable_blockchain
    kind: workable
    apply_account_slugs_registry: package:workable_apply_slugs.blockchain.yaml

  - id: custom_career_blockchain
    kind: custom_career_page
    careers_pages_registry: package:career_pages.blockchain.yaml

  # Zapier “fully remote / work from anywhere” list (``*.zapier.yaml`` in registries/).
  - id: greenhouse_zapier
    kind: greenhouse
    board_tokens_registry: package:greenhouse_boards.zapier.yaml

  - id: ashby_zapier
    kind: ashby
    organization_slugs_registry: package:ashby_organization_slugs.zapier.yaml

  - id: workable_zapier
    kind: workable
    apply_account_slugs_registry: package:workable_apply_slugs.zapier.yaml

  - id: custom_career_zapier
    kind: custom_career_page
    careers_pages_registry: package:career_pages.zapier.yaml

  # Globally remote–friendly US / global B2B tech employers (``*.globally_remote.yaml`` in registries/).
  - id: greenhouse_globally_remote
    kind: greenhouse
    board_tokens_registry: package:greenhouse_boards.globally_remote.yaml

  - id: ashby_globally_remote
    kind: ashby
    organization_slugs_registry: package:ashby_organization_slugs.globally_remote.yaml

  - id: workable_globally_remote
    kind: workable
    apply_account_slugs_registry: package:workable_apply_slugs.globally_remote.yaml

  - id: lever_globally_remote
    kind: lever
    site_slugs_registry: package:lever_site_slugs.globally_remote.yaml

  - id: custom_career_globally_remote
    kind: custom_career_page
    careers_pages_registry: package:career_pages.globally_remote.yaml

  # US-headquartered employers that hire from Canada / Vancouver (``*.us_hires_canada.yaml``).
  - id: greenhouse_us_hires_canada
    kind: greenhouse
    board_tokens_registry: package:greenhouse_boards.us_hires_canada.yaml

  - id: ashby_us_hires_canada
    kind: ashby
    organization_slugs_registry: package:ashby_organization_slugs.us_hires_canada.yaml

  - id: workable_us_hires_canada
    kind: workable
    apply_account_slugs_registry: package:workable_apply_slugs.us_hires_canada.yaml

  - id: lever_us_hires_canada
    kind: lever
    site_slugs_registry: package:lever_site_slugs.us_hires_canada.yaml

  - id: custom_career_us_hires_canada
    kind: custom_career_page
    careers_pages_registry: package:career_pages.us_hires_canada.yaml

  # Inline extras (merged with their own ids if you prefer single-board rows):
  # - id: greenhouse_extra
  #   kind: greenhouse
  #   board_tokens:
  #     - anthropic
  #     - stripe
